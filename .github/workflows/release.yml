name: Release

# Build the app and attach it to a GitHub Release whenever a version tag is pushed.
# Usage:  git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write         # needed to create the release and upload assets

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build .app bundle
        run: ./build.sh

      - name: Package (zip, preserving code signature)
        run: |
          cd dist
          ditto -c -k --keepParent "Claude Usage Monitor.app" "Claude Usage Monitor.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeUsageMonitor
          path: dist/Claude Usage Monitor.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} exists — uploading asset (overwrite)."
            gh release upload "${GITHUB_REF_NAME}" \
              "dist/Claude Usage Monitor.zip" --clobber
          else
            echo "Creating release ${GITHUB_REF_NAME}."
            gh release create "${GITHUB_REF_NAME}" \
              "dist/Claude Usage Monitor.zip" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
